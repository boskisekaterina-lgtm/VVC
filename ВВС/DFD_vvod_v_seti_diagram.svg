<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2500" viewBox="0 0 1800 2500">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .section { font: 700 26px Arial, sans-serif; fill: #0f3f6e; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text { font: 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .entity { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 12; }
      .process { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 12; }
      .store { fill: #f8fafc; stroke: #64748b; stroke-width: 3; }
      .state { fill: #f8fafc; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; rx: 12; }
      .goal { fill: #f0fdf4; stroke: #16a34a; stroke-width: 4; }
      .choice { fill: #fffbeb; stroke: #d97706; stroke-width: 4; }
      .control { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 3; rx: 12; }
      .analytics { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 12; }
      .arrow { stroke: #0f3f6e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .connector { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowGray); }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .legendBox { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f3f6e"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1760" height="2460" fill="#f8fafc" rx="24"/>

  <text x="70" y="90" class="title">DFD-диаграмма процесса "Ввод поставщика в торговую сеть"</text>
  <text x="70" y="125" class="subtitle">Источник: ВВС2.csv. Формат: изображение SVG с реальными фигурами по условным обозначениям.</text>

  <rect x="70" y="165" width="1660" height="230" class="legendBox"/>
  <text x="100" y="205" class="section">1. Условные обозначения</text>

  <rect x="110" y="235" width="190" height="70" class="entity"/>
  <text x="205" y="277" text-anchor="middle" class="label">Внешняя сущность</text>
  <text x="110" y="335" class="small">Прямоугольник</text>

  <rect x="360" y="235" width="190" height="70" class="process"/>
  <text x="455" y="277" text-anchor="middle" class="label">Процесс</text>
  <text x="360" y="335" class="small">Прямоугольник</text>

  <circle cx="690" cy="270" r="45" class="goal"/>
  <text x="690" y="277" text-anchor="middle" class="label">Цель</text>
  <text x="640" y="335" class="small">Круг</text>

  <polygon points="860,225 915,280 860,335 805,280" class="choice"/>
  <text x="860" y="285" text-anchor="middle" class="label">Выбор</text>
  <text x="810" y="365" class="small">Ромб</text>

  <path d="M 1010 270 L 1140 270" class="arrow"/>
  <text x="1075" y="255" text-anchor="middle" class="small">Поток данных</text>

  <path d="M 1260 225 L 1260 335 M 1278 225 L 1278 335 M 1260 225 L 1390 225 M 1260 335 L 1390 335" class="store"/>
  <text x="1325" y="285" text-anchor="middle" class="label">Хранилище</text>
  <text x="1260" y="365" class="small">База / реестр / журнал</text>

  <rect x="1480" y="235" width="190" height="70" class="state"/>
  <text x="1575" y="267" text-anchor="middle" class="label">Состояние базы</text>
  <text x="1575" y="289" text-anchor="middle" class="small">Пунктирный блок</text>

  <rect x="70" y="435" width="1660" height="520" class="panel"/>
  <text x="100" y="480" class="section">2. Рисунок 1. Контекстная DFD, уровень 0</text>

  <rect x="120" y="600" width="240" height="90" class="entity"/>
  <text x="240" y="635" text-anchor="middle" class="label">Поставщик / производитель</text>
  <text x="240" y="662" text-anchor="middle" class="small">данные компании, анкета, договоры, отчеты</text>

  <rect x="120" y="760" width="240" height="90" class="entity"/>
  <text x="240" y="798" text-anchor="middle" class="label">Собственник производителя</text>
  <text x="240" y="823" text-anchor="middle" class="small">подтверждение условий</text>

  <rect x="1450" y="600" width="220" height="90" class="entity"/>
  <text x="1560" y="638" text-anchor="middle" class="label">Торговая сеть</text>
  <text x="1560" y="663" text-anchor="middle" class="small">заказ, оплата, обратная связь</text>

  <rect x="1450" y="760" width="220" height="90" class="entity"/>
  <text x="1560" y="798" text-anchor="middle" class="label">ЛПР сети</text>
  <text x="1560" y="823" text-anchor="middle" class="small">требования, статусы, решения</text>

  <rect x="450" y="520" width="320" height="90" class="entity"/>
  <text x="610" y="558" text-anchor="middle" class="label">Команда КВК / дивизион</text>
  <text x="610" y="583" text-anchor="middle" class="small">лиды, сопровождение, контроль</text>

  <rect x="720" y="650" width="360" height="130" class="process"/>
  <text x="900" y="705" text-anchor="middle" class="label">P0. Ввод поставщика</text>
  <text x="900" y="731" text-anchor="middle" class="label">в торговую сеть</text>

  <circle cx="1225" cy="715" r="85" class="goal"/>
  <text x="1225" y="700" text-anchor="middle" class="label">Цель</text>
  <text x="1225" y="725" text-anchor="middle" class="small">ввод в сеть</text>
  <text x="1225" y="747" text-anchor="middle" class="small">и закрепление</text>

  <path d="M 360 645 L 720 690" class="arrow"/>
  <text x="525" y="645" text-anchor="middle" class="small">первичные данные</text>
  <path d="M 360 805 L 720 740" class="arrow"/>
  <text x="520" y="785" text-anchor="middle" class="small">подтверждение условий</text>
  <path d="M 610 610 L 780 650" class="arrow"/>
  <text x="690" y="620" text-anchor="middle" class="small">лиды и контроль</text>

  <path d="M 1080 690 L 1450 645" class="arrow"/>
  <text x="1260" y="645" text-anchor="middle" class="small">предложение и условия</text>
  <path d="M 1450 805 L 1080 740" class="arrow"/>
  <text x="1260" y="785" text-anchor="middle" class="small">требования и статусы</text>
  <path d="M 1080 715 L 1140 715" class="arrow"/>
  <text x="1110" y="700" text-anchor="middle" class="small">результат</text>

  <path d="M 720 730 L 360 730" class="arrow"/>
  <text x="520" y="715" text-anchor="middle" class="small">контакты ЛПР, список сетей</text>

  <rect x="70" y="995" width="1660" height="1120" class="panel"/>
  <text x="100" y="1040" class="section">3. Рисунок 2. DFD уровня 1</text>
  <text x="100" y="1070" class="subtitle">Этапы процесса, потоки данных, хранилища и изменение состояния базы поставщиков</text>

  <rect x="110" y="1120" width="220" height="80" class="process"/>
  <text x="220" y="1155" text-anchor="middle" class="label">P1. Собрать информацию</text>
  <text x="220" y="1178" text-anchor="middle" class="small">и провести лидогенерацию</text>

  <path d="M 370 1115 L 370 1205 M 388 1115 L 388 1205 M 370 1115 L 490 1115 M 370 1205 L 490 1205" class="store"/>
  <text x="430" y="1150" text-anchor="middle" class="label">D1. База лидов</text>
  <text x="430" y="1173" text-anchor="middle" class="small">КВК</text>

  <rect x="540" y="1120" width="220" height="80" class="state"/>
  <text x="650" y="1155" text-anchor="middle" class="label">Состояние базы</text>
  <text x="650" y="1178" text-anchor="middle" class="small">потенциальный поставщик</text>

  <rect x="810" y="1120" width="220" height="80" class="process"/>
  <text x="920" y="1155" text-anchor="middle" class="label">P2. Провести</text>
  <text x="920" y="1178" text-anchor="middle" class="small">анкетирование и оценку</text>

  <path d="M 1070 1115 L 1070 1205 M 1088 1115 L 1088 1205 M 1070 1115 L 1190 1115 M 1070 1205 L 1190 1205" class="store"/>
  <text x="1130" y="1150" text-anchor="middle" class="label">D2. Анкета</text>
  <text x="1130" y="1173" text-anchor="middle" class="small">и оценка потенциала</text>

  <rect x="1240" y="1120" width="220" height="80" class="state"/>
  <text x="1350" y="1155" text-anchor="middle" class="label">Состояние базы</text>
  <text x="1350" y="1178" text-anchor="middle" class="small">поставщик с анкетой</text>

  <path d="M 330 1160 L 370 1160" class="arrow"/>
  <path d="M 490 1160 L 540 1160" class="arrow"/>
  <path d="M 760 1160 L 810 1160" class="arrow"/>
  <path d="M 1030 1160 L 1070 1160" class="arrow"/>
  <path d="M 1190 1160 L 1240 1160" class="arrow"/>
  <text x="350" y="1145" text-anchor="middle" class="small">лид</text>
  <text x="515" y="1145" text-anchor="middle" class="small">карточка лида</text>
  <text x="785" y="1145" text-anchor="middle" class="small">исходные данные</text>
  <text x="1050" y="1145" text-anchor="middle" class="small">анкета</text>
  <text x="1215" y="1145" text-anchor="middle" class="small">результат оценки</text>

  <rect x="110" y="1255" width="220" height="80" class="process"/>
  <text x="220" y="1290" text-anchor="middle" class="label">P3. Согласовать сети</text>
  <text x="220" y="1313" text-anchor="middle" class="small">и условия входа</text>

  <path d="M 370 1250 L 370 1340 M 388 1250 L 388 1340 M 370 1250 L 490 1250 M 370 1340 L 490 1340" class="store"/>
  <text x="430" y="1285" text-anchor="middle" class="label">D4. Сети и контакты</text>
  <text x="430" y="1308" text-anchor="middle" class="small">ЛПР</text>

  <rect x="540" y="1255" width="220" height="80" class="state"/>
  <text x="650" y="1290" text-anchor="middle" class="label">Состояние базы</text>
  <text x="650" y="1313" text-anchor="middle" class="small">согласованы сети и условия</text>

  <rect x="810" y="1255" width="220" height="80" class="process"/>
  <text x="920" y="1290" text-anchor="middle" class="label">P4. Оформить</text>
  <text x="920" y="1313" text-anchor="middle" class="small">договоры и ДС</text>

  <path d="M 1070 1250 L 1070 1340 M 1088 1250 L 1088 1340 M 1070 1250 L 1190 1250 M 1070 1340 L 1190 1340" class="store"/>
  <text x="1130" y="1285" text-anchor="middle" class="label">D3. Договоры</text>
  <text x="1130" y="1308" text-anchor="middle" class="small">и ДС</text>

  <rect x="1240" y="1255" width="220" height="80" class="state"/>
  <text x="1350" y="1290" text-anchor="middle" class="label">Состояние базы</text>
  <text x="1350" y="1313" text-anchor="middle" class="small">договорная база оформлена</text>

  <path d="M 330 1295 L 370 1295" class="arrow"/>
  <path d="M 490 1295 L 540 1295" class="arrow"/>
  <path d="M 760 1295 L 810 1295" class="arrow"/>
  <path d="M 1030 1295 L 1070 1295" class="arrow"/>
  <path d="M 1190 1295 L 1240 1295" class="arrow"/>
  <text x="350" y="1280" text-anchor="middle" class="small">список сетей</text>
  <text x="515" y="1280" text-anchor="middle" class="small">согласование</text>
  <text x="785" y="1280" text-anchor="middle" class="small">условия</text>
  <text x="1050" y="1280" text-anchor="middle" class="small">подписанные документы</text>
  <text x="1215" y="1280" text-anchor="middle" class="small">комплект документов</text>

  <rect x="110" y="1390" width="220" height="80" class="process"/>
  <text x="220" y="1425" text-anchor="middle" class="label">P5. Передать</text>
  <text x="220" y="1448" text-anchor="middle" class="small">контакты ЛПР</text>

  <rect x="430" y="1390" width="220" height="80" class="state"/>
  <text x="540" y="1425" text-anchor="middle" class="label">Состояние базы</text>
  <text x="540" y="1448" text-anchor="middle" class="small">поставщик готов к переговорам</text>

  <rect x="760" y="1390" width="220" height="80" class="process"/>
  <text x="870" y="1425" text-anchor="middle" class="label">P6. Сопровождать</text>
  <text x="870" y="1448" text-anchor="middle" class="small">коммуникации с сетью</text>

  <path d="M 1020 1385 L 1020 1475 M 1038 1385 L 1038 1475 M 1020 1385 L 1140 1385 M 1020 1475 L 1140 1475" class="store"/>
  <text x="1080" y="1420" text-anchor="middle" class="label">D5. Журнал</text>
  <text x="1080" y="1443" text-anchor="middle" class="small">коммуникаций</text>

  <polygon points="1290,1385 1360,1455 1290,1525 1220,1455" class="choice"/>
  <text x="1290" y="1446" text-anchor="middle" class="small">Есть договор</text>
  <text x="1290" y="1466" text-anchor="middle" class="small">или заказ?</text>

  <path d="M 330 1430 L 430 1430" class="arrow"/>
  <path d="M 650 1430 L 760 1430" class="arrow"/>
  <path d="M 980 1430 L 1020 1430" class="arrow"/>
  <path d="M 1140 1430 L 1220 1430" class="arrow"/>
  <text x="380" y="1415" text-anchor="middle" class="small">контакты ЛПР</text>
  <text x="705" y="1415" text-anchor="middle" class="small">контакты и материалы</text>
  <text x="1000" y="1415" text-anchor="middle" class="small">статус переговоров</text>
  <text x="1180" y="1415" text-anchor="middle" class="small">договор или заказ</text>

  <path d="M 1290 1525 L 1290 1590 L 870 1590 L 870 1470" class="connector"/>
  <text x="1210" y="1578" class="small">нет, доработка предложения</text>

  <rect x="1430" y="1390" width="220" height="80" class="process"/>
  <text x="1540" y="1425" text-anchor="middle" class="label">P7. Контролировать</text>
  <text x="1540" y="1448" text-anchor="middle" class="small">заказ и оплату</text>
  <path d="M 1360 1455 L 1430 1430" class="arrow"/>
  <text x="1395" y="1420" text-anchor="middle" class="small">да</text>

  <path d="M 1430 1525 L 1430 1615 M 1448 1525 L 1448 1615 M 1430 1525 L 1550 1525 M 1430 1615 L 1550 1615" class="store"/>
  <text x="1490" y="1560" text-anchor="middle" class="label">D6. Заказы, оплаты,</text>
  <text x="1490" y="1583" text-anchor="middle" class="small">акты сверок</text>

  <rect x="110" y="1660" width="220" height="80" class="state"/>
  <text x="220" y="1695" text-anchor="middle" class="label">Состояние базы</text>
  <text x="220" y="1718" text-anchor="middle" class="small">первый заказ и контроль оплаты</text>

  <rect x="430" y="1660" width="220" height="80" class="process"/>
  <text x="540" y="1695" text-anchor="middle" class="label">P8. Закрепить</text>
  <text x="540" y="1718" text-anchor="middle" class="small">поставщика на полке</text>

  <path d="M 690 1655 L 690 1745 M 708 1655 L 708 1745 M 690 1655 L 810 1655 M 690 1745 L 810 1745" class="store"/>
  <text x="750" y="1690" text-anchor="middle" class="label">D7. Отзывы и</text>
  <text x="750" y="1713" text-anchor="middle" class="small">обратная связь</text>

  <rect x="920" y="1660" width="220" height="80" class="state"/>
  <text x="1030" y="1695" text-anchor="middle" class="label">Состояние базы</text>
  <text x="1030" y="1718" text-anchor="middle" class="small">активный сетевой поставщик</text>

  <circle cx="1320" cy="1700" r="80" class="goal"/>
  <text x="1320" y="1688" text-anchor="middle" class="label">Цель</text>
  <text x="1320" y="1712" text-anchor="middle" class="small">повторный, третий</text>
  <text x="1320" y="1734" text-anchor="middle" class="small">и N-заказ</text>

  <path d="M 1490 1615 L 1490 1700 L 330 1700" class="arrow"/>
  <text x="1110" y="1685" text-anchor="middle" class="small">статус заказа и оплаты</text>
  <path d="M 330 1700 L 430 1700" class="arrow"/>
  <path d="M 650 1700 L 690 1700" class="arrow"/>
  <path d="M 810 1700 L 920 1700" class="arrow"/>
  <path d="M 1140 1700 L 1240 1700" class="arrow"/>
  <text x="380" y="1685" text-anchor="middle" class="small">факт первого заказа</text>
  <text x="670" y="1685" text-anchor="middle" class="small">отзывы клиента</text>
  <text x="865" y="1685" text-anchor="middle" class="small">результаты закрепления</text>
  <text x="1180" y="1685" text-anchor="middle" class="small">финальный результат</text>

  <rect x="110" y="1805" width="400" height="105" class="entity"/>
  <text x="310" y="1843" text-anchor="middle" class="label">Роли владельцев этапов</text>
  <text x="310" y="1868" text-anchor="middle" class="small">P1: КВК; P2: КВК + поставщик; P3: КВК + собственник</text>
  <text x="310" y="1890" text-anchor="middle" class="small">P4: КВК + поставщик; P5: КВК; P6: поставщик + КВК;</text>
  <text x="310" y="1912" text-anchor="middle" class="small">P7: КВК + поставщик; P8: КВК + поставщик + сеть</text>

  <rect x="70" y="2140" width="1660" height="260" class="panel"/>
  <text x="100" y="2185" class="section">4. Рисунок 3. Контур контроля, аналитики и руководства</text>

  <rect x="130" y="2235" width="360" height="90" class="analytics"/>
  <text x="310" y="2272" text-anchor="middle" class="label">Аналитика воронки</text>
  <text x="310" y="2297" text-anchor="middle" class="small">лиды → анкеты → сети → договоры → заказы → повторные заказы</text>

  <rect x="690" y="2235" width="420" height="90" class="control"/>
  <text x="900" y="2272" text-anchor="middle" class="label">Руководитель дивизиона / КВК</text>
  <text x="900" y="2297" text-anchor="middle" class="small">контроль сроков, статусов, оплат, отзывов</text>

  <rect x="1310" y="2235" width="300" height="90" class="process"/>
  <text x="1460" y="2272" text-anchor="middle" class="label">Управленческие действия</text>
  <text x="1460" y="2297" text-anchor="middle" class="small">доработка условий, усиление коммуникаций</text>

  <path d="M 490 2280 L 690 2280" class="arrow"/>
  <path d="M 1110 2280 L 1310 2280" class="arrow"/>
  <text x="590" y="2265" text-anchor="middle" class="small">отчет и отклонения</text>
  <text x="1210" y="2265" text-anchor="middle" class="small">решения и корректировки</text>
</svg>
