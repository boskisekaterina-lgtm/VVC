<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>ВВС Поставщики - A3 печатный макет</title>
  <style>
    @page { size: A3 landscape; margin: 0; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #e9edf2; }
    .sheet {
      width: 420mm;
      height: 297mm;
      page-break-after: always;
      break-after: page;
      background: white;
      overflow: hidden;
    }
    .sheet img {
      display: block;
      width: 420mm;
      height: 297mm;
    }
    @media screen {
      body { padding: 16px; }
      .sheet {
        margin: 0 auto 16px;
        box-shadow: 0 8px 32px rgba(20, 30, 45, .18);
      }
    }
  </style>
</head>
<body>
  <section class="sheet">
    <img src="01_A3_overview.png" alt="Лист 1. Общий вид">
  </section>
  <section class="sheet">
    <img src="02_A3_fragment_1_1.png" alt="Лист 2. Фрагмент 1-1">
  </section>
  <section class="sheet">
    <img src="03_A3_fragment_1_2.png" alt="Лист 3. Фрагмент 1-2">
  </section>
  <section class="sheet">
    <img src="04_A3_fragment_1_3.png" alt="Лист 4. Фрагмент 1-3">
  </section>
  <section class="sheet">
    <img src="05_A3_fragment_1_4.png" alt="Лист 5. Фрагмент 1-4">
  </section>
  <section class="sheet">
    <img src="06_A3_fragment_2_1.png" alt="Лист 6. Фрагмент 2-1">
  </section>
  <section class="sheet">
    <img src="07_A3_fragment_2_2.png" alt="Лист 7. Фрагмент 2-2">
  </section>
  <section class="sheet">
    <img src="08_A3_fragment_2_3.png" alt="Лист 8. Фрагмент 2-3">
  </section>
  <section class="sheet">
    <img src="09_A3_fragment_2_4.png" alt="Лист 9. Фрагмент 2-4">
  </section>
</body>
</html>
